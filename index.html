<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>VIRA AI VISION</title>

  <!-- FACE API -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <!-- STYLE -->
  <link rel="stylesheet" href="style.css">

</head>

<body class="neutral">

  <!-- VIDEO CAMERA -->
  <video
    id="video"
    autoplay
    muted
    playsinline>
  </video>

  <!-- CANVAS DETECTION -->
  <canvas id="overlay"></canvas>

  <!-- HUD -->
  <div class="overlay-ui">

      <div class="hud-box">

          <h1 id="title">
              VIRA  AI SYSTEM
          </h1>

          <p id="status">
              Initializing Camera...
          </p>

      </div>

  </div>

  <!-- OUTPUT TEXT -->
  <div id="outputText">
      Menunggu deteksi wajah...
  </div>

  <!-- SCAN LINE -->
  <div class="scan-line"></div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
